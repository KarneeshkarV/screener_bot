timezone: Asia/Kolkata

telegram:
  allowed_chat_ids:
    - 5526359855

scheduled_screener:
  enabled: true
  times:
    - "16:00"
    - "02:30"
  working_directory: /home/karneeshkar/Desktop/personal/screener
  timeout_seconds: 300
  commands:
    - label: India EMA
      command: ["uv", "run", "screener", "screen", "-m", "india", "-c", "ema", "-n", "30"]
    - label: US EMA
      command: ["uv", "run", "screener", "screen", "-m", "us", "-c", "ema", "-n", "30"]
    - label: India Promoter Holding Change
      command: ["uv", "run", "screener", "promoter-buys", "-m", "india", "--min-change", "0", "-n", "30"]
    - label: US Insider Holding Change
      command: ["uv", "run", "screener", "promoter-buys", "-m", "us", "-n", "30"]

portfolio:
  # US holdings
  - symbol: AAPL
    market: us
    avg_price: 267.18
    ruleset: swing_momentum

  - symbol: AMZN
    market: us
    avg_price: 252.90
    ruleset: swing_momentum

  - symbol: NBIS
    market: us
    avg_price: 179.20
    ruleset: swing_momentum

  # India (NSE) holdings
  - symbol: NSE:ATHERENERG
    market: india
    avg_price: 906.78
    ruleset: swing_momentum

  - symbol: NSE:CPPLUS
    market: india
    avg_price: 2453.95
    ruleset: swing_momentum

  - symbol: NSE:EBGNG
    market: india
    avg_price: 422.80
    ruleset: swing_momentum

  - symbol: NSE:GODREJPROP
    market: india
    avg_price: 1847.50
    ruleset: swing_momentum

  - symbol: NSE:NMDC
    market: india
    avg_price: 89.88
    ruleset: swing_momentum

rulesets:
  swing_momentum:
    entry:
      all:
        - expression: "rsi(close, 14) > 55"
        - expression: "close > ema(close, 20)"
    exit:
      any:
        - expression: "rsi(close, 14) < 45"
        - expression: "close < ema(close, 20)"

technical_snapshot:
  expressions:
    - label: RSI 14
      expression: "rsi(close, 14)"
    - label: Above EMA20
      expression: "close > ema(close, 20)"
    - label: Above EMA50
      expression: "close > ema(close, 50)"
